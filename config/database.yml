default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("POSTGRES_HOST") { "db" } %>
  port: <%= ENV.fetch("POSTGRES_PORT") { 5432 } %>
  username: <%= ENV.fetch("POSTGRES_USER") { "dataforge" } %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD") { "changeme" } %>

development:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB") { "dataforge_development" } %>

test:
  <<: *default
  database: dataforge_test

production:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB") { "dataforge_production" } %>
